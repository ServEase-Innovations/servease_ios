apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

/**
 * React Native Configuration
 */
react {
    autolinkLibrariesWithApp()
    // Ensure debug APK also contains a JS bundle fallback so app can start
    // even when Metro connectivity is flaky on emulator/device networking.
    debuggableVariants = []
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'
def keystoreFile = file("$rootDir/release.keystore")


/**
 * Hermes Fix for CI – prevents "unknown property hermesEnabled"
 */
project.ext.react = [
    enableHermes: true
]

def enableHermes = project.ext.react.get("enableHermes", false)
def hermesEnabled = enableHermes

def versionPropsFile = rootProject.file("version.properties")
def versionProps = new Properties()
if (versionPropsFile.exists()) {
    versionProps.load(new FileInputStream(versionPropsFile))
}

/** CI sets VERSION_CODE / VERSION_NAME env; local builds use version.properties */
def appVersionCode = {
    def fromEnv = System.getenv("VERSION_CODE")?.trim()
    if (fromEnv) return fromEnv.toInteger()
    return (versionProps.getProperty("VERSION_CODE", "1") as Integer)
}

def appVersionName = {
    def fromEnv = System.getenv("VERSION_NAME")?.trim()
    if (fromEnv) return fromEnv
    return versionProps.getProperty("VERSION_NAME", "1.0.1${appVersionCode()}")
}

android {
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.serveaso"

    defaultConfig {
        applicationId "com.serveaso"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode()
        versionName appVersionName()

        manifestPlaceholders = [
            auth0Domain: "dev-y0yafxo2cjqtu8y2.us.auth0.com",
            auth0Scheme: "${applicationId}.auth0"
        ]
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("ANDROID_KEYSTORE_PATH") ?: "$rootDir/release.keystore")
            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
            keyAlias System.getenv("ANDROID_KEY_ALIAS")
            keyPassword System.getenv("ANDROID_KEY_PASSWORD")
        }
    }

    buildTypes {
        debug {
            // debug config (optional)
        }

        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile(
                'proguard-android-optimize.txt'
            ), 'proguard-rules.pro'
        }
    }
}


dependencies {
    // React Native Android
    implementation("com.facebook.react:react-android")

    // RN Razorpay (ONLY source of Razorpay)
    implementation(project(":react-native-razorpay")) {
        exclude group: "com.razorpay", module: "core"
        exclude group: "com.razorpay", module: "standard-core"
    }

    // Google Play Services (keep ONE version)
    implementation ("com.google.android.gms:play-services-location:20.0.0")
    implementation ("com.google.android.gms:play-services-maps:18.2.0")

    implementation 'androidx.appcompat:appcompat:1.6.1'

    // Hermes / JSC
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

configurations.all {
    resolutionStrategy {
        force "com.razorpay:checkout:1.6.20"
    }
}

/** Bump version.properties after a local release APK (optional). */
tasks.register("bumpAndroidVersion") {
    doLast {
        def code = (versionProps.getProperty("VERSION_CODE", "1") as Integer) + 1
        def name = "1.0.1${code}"
        versionProps.setProperty("VERSION_CODE", code.toString())
        versionProps.setProperty("VERSION_NAME", name)
        versionProps.store(versionPropsFile.newWriter(), "Auto-incremented by bumpAndroidVersion\n")
        println "Android version → ${name} (${code})"
    }
}

apply plugin: "com.google.gms.google-services"

