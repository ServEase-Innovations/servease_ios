name: Android Release + Firebase Distribution

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Set Android version (incremental per CI build)
        id: android_version
        run: |
          BUILD_NUM="${{ github.run_number }}"
          VERSION_CODE="$BUILD_NUM"
          VERSION_NAME="1.0.${BUILD_NUM}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building Android ${VERSION_NAME} (versionCode ${VERSION_CODE})"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 🔐 Decode keystore
      - name: Decode Android keystore
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # 🧱 Build APK
      - name: Build Release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ../release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        run: |
          ./gradlew clean
          ./gradlew assembleRelease

      - name: Persist version.properties for repo
        run: |
          printf 'VERSION_CODE=%s\nVERSION_NAME=%s\n' \
            "${{ env.VERSION_CODE }}" "${{ env.VERSION_NAME }}" > android/version.properties
          cat android/version.properties

      # 🔥 Firebase CLI    

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

     # 🔥 Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 🚀 Firebase App Distribution
      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app 1:87480797347:android:f26b2cff897992b3eb9716 \
            --groups "testers-1" \
            --release-notes "Serveaso Android ${{ env.VERSION_NAME }} (build ${{ github.run_number }})"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/version.properties
          git diff --staged --quiet || git commit -m "chore(android): bump version to ${{ env.VERSION_NAME }} [skip ci]"
          git push || true
