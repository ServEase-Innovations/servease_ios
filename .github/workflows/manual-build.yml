name: Android Manual Build & Firebase Distribution

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select the branch to build"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - develop
          - staging
          - production

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------
      # CHECKOUT
      # ---------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}

      # ---------------------------------------
      # CACHE: NODE + GRADLE + ANDROID SDK
      # ---------------------------------------

      - name: Cache node_modules
        uses: actions/cache@v3
        id: node-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-v1

      # ---------------------------------------
      # SETUP JAVA & ANDROID SDK
      # ---------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------------------
      # ULTRA-OPTIMIZED GRADLE CONFIG
      # ---------------------------------------
      - name: Configure Gradle Performance
        run: |
          mkdir -p ~/.gradle
          cat <<EOF > ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=true
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.configureondemand=true
          org.gradle.workers.max=4

          kotlin.incremental=true
          kotlin.incremental.useClasspathSnapshot=true

          org.gradle.cache.compress=true
          EOF

      # ---------------------------------------
      # KEYSTORE SETUP
      # ---------------------------------------
      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Add signing properties
        run: |
          cat <<EOF >> android/gradle.properties
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ---------------------------------------
      # NODE SETUP
      # ---------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "npm"

      - name: Install Dependencies (Fast)
        run: npm install --omit=dev
        if: steps.node-cache.outputs.cache-hit != 'true'

      # ---------------------------------------
      # AUTO VERSIONING
      # ---------------------------------------
      - name: Auto Versioning
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="$LAST_TAG+build.$VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Apply version
        run: |
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" android/app/build.gradle

      # ---------------------------------------
      # BUILD RELEASE APK (FASTEST)
      # ---------------------------------------
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache \
            --max-workers=4

      # ---------------------------------------
      # UPLOAD APK ARTIFACT
      # ---------------------------------------
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/apk/release/app-release.apk

      # ---------------------------------------
      # FIREBASE AUTH
      # ---------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ---------------------------------------
      # FIREBASE DISTRIBUTION
      # ---------------------------------------
      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute "android/app/build/outputs/apk/release/app-release.apk" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --groups "${{ secrets.FIREBASE_GROUPS }}" \
            --testers "${{ secrets.FIREBASE_TESTERS }}" \
            --release-notes "Build ${{ env.VERSION_NAME }}"
